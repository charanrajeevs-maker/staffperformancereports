name: Daily WhatsApp Performance Reports

on:
  repository_dispatch:
    types: [daily-whatsapp-reports]
  workflow_dispatch:

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node.js Dependencies
        run: |
          npm install whatsapp-web.js qrcode-terminal firebase-admin

      - name: Run WhatsApp Sender Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/send-whatsapp-performance.js
